name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Get latest minware-singer-utils version
      id: get-utils-version
      env:
        GITHUB_TOKEN: ${{ secrets.MINWARE_GITHUB_TOKEN }}
      run: |
        LATEST_COMMIT=$(git ls-remote https://github.com/minwareco/minware-singer-utils.git HEAD | cut -f1)
        echo "UTILS_VERSION=$LATEST_COMMIT" >> $GITHUB_ENV
        echo "Using minware-singer-utils version: $LATEST_COMMIT"

    - name: Install dependencies
      env:
        GITHUB_TOKEN: ${{ secrets.MINWARE_GITHUB_TOKEN }}
        UTILS_VERSION: ${{ env.UTILS_VERSION }}
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install pytest
    
    - name: Run unit tests
      run: |
        python -m pytest tests/unittests/ -v --tb=short

